name: Pulumi Deploy

on:
  push:
    branches: [main]
    paths:
      - "pulumi/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: pulumi-deploy-${{ github.repository }}-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'eu-central-1' }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_TO_ASSUME }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Detect automation credentials
        id: credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          if { [ -n "${AWS_ROLE_TO_ASSUME}" ] || { [ -n "${AWS_ACCESS_KEY_ID}" ] && [ -n "${AWS_SECRET_ACCESS_KEY}" ]; }; } \
            && [ -n "${PULUMI_ACCESS_TOKEN}" ]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "ready=false" >> "${GITHUB_OUTPUT}"

      - name: Skip deploy when credentials are not configured
        if: ${{ steps.credentials.outputs.ready != 'true' }}
        run: |
          echo "Skipping Pulumi deploy because AWS credentials or PULUMI_ACCESS_TOKEN are not configured for this repository."

      - name: Setup Python
        if: ${{ steps.credentials.outputs.ready == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        if: ${{ steps.credentials.outputs.ready == 'true' }}
        uses: snok/install-poetry@v1

      - name: Install dependencies
        if: ${{ steps.credentials.outputs.ready == 'true' }}
        working-directory: ./pulumi
        run: poetry install --no-interaction --no-ansi

      - name: Configure AWS Credentials via OIDC
        if: ${{ steps.credentials.outputs.ready == 'true' && env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS Credentials via static keys
        if: ${{ steps.credentials.outputs.ready == 'true' && env.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy with Pulumi
        if: ${{ steps.credentials.outputs.ready == 'true' }}
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: dev
          work-dir: ./pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
