name: Pulumi PR Guardrails

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  preview:
    name: Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      PULUMI_SKIP_UPDATE_CHECK: "true"
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      PULUMI_BACKEND_URL: file:///workspace/.pulumi-backend
      PULUMI_PREVIEW_STACKS: ${{ vars.PULUMI_PREVIEW_STACKS }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Prepare Docker context
        run: ./scripts/prepare_docker_context.sh

      - name: Run preview guardrail
        run: ./scripts/publish_pulumi_preview_summary.sh

      - name: Upload preview artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pulumi-preview-unprivileged
          path: .artifacts/pulumi-preview

  preview_privileged:
    name: Preview (OIDC)
    if: >-
      ${{
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository) &&
        vars.AWS_OIDC_ROLE_ARN != '' &&
        vars.PULUMI_BACKEND_URL != ''
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    env:
      PULUMI_SKIP_UPDATE_CHECK: "true"
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      PULUMI_BACKEND_URL: ${{ vars.PULUMI_BACKEND_URL }}
      PULUMI_PREVIEW_STACKS: ${{ vars.PULUMI_PREVIEW_STACKS }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          role-session-name: gha-pulumi-preview-${{ github.run_id }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Prepare Docker context
        run: ./scripts/prepare_docker_context.sh

      - name: Require shared Pulumi backend
        run: |
          if [[ -z "${PULUMI_BACKEND_URL:-}" ]]; then
            echo "error: set the PULUMI_BACKEND_URL repository variable for privileged previews." >&2
            exit 1
          fi

      - name: Run preview guardrail
        env:
          PULUMI_REQUIRE_SHARED_BACKEND: "true"
        run: ./scripts/publish_pulumi_preview_summary.sh

      - name: Upload privileged preview artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pulumi-preview-privileged
          path: .artifacts/pulumi-preview

  destructive_diff:
    name: Destructive Diff Gate
    if: >-
      ${{
        always() &&
        needs.preview.result == 'success' &&
        (needs.preview_privileged.result == 'success' ||
          needs.preview_privileged.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    needs:
      - preview
      - preview_privileged
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Prepare Docker context
        run: ./scripts/prepare_docker_context.sh

      - name: Download privileged preview artifact
        if: ${{ needs.preview_privileged.result == 'success' }}
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: pulumi-preview-privileged
          path: .artifacts/pulumi-preview

      - name: Download unprivileged preview artifact
        if: ${{ needs.preview_privileged.result != 'success' }}
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: pulumi-preview-unprivileged
          path: .artifacts/pulumi-preview

      - name: Stage GitHub event payload for the guardrail helper
        run: |
          mkdir -p .artifacts
          cp "${GITHUB_EVENT_PATH}" .artifacts/github-event.json

      - name: Enforce destructive diff gate
        run: make test-destructive-diff

  iam_validation:
    name: IAM Validation
    if: >-
      ${{
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository) &&
        vars.AWS_OIDC_ROLE_ARN != '' &&
        vars.PULUMI_BACKEND_URL != ''
      }}
    runs-on: ubuntu-latest
    needs:
      - preview
      - preview_privileged
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    env:
      PULUMI_SKIP_UPDATE_CHECK: "true"
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          role-session-name: gha-iam-validate-${{ github.run_id }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Prepare Docker context
        run: ./scripts/prepare_docker_context.sh

      - name: Download preview artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: pulumi-preview-privileged
          path: .artifacts/pulumi-preview

      - name: Validate IAM policies
        run: make test-iam-validation
