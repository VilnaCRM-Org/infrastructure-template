name: Python Quality Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PULUMI_SKIP_UPDATE_CHECK: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Prepare Docker context
        run: ./scripts/prepare_docker_context.sh

      - name: Run Ruff suite inside Docker
        run: make test-ruff

  ty:
    name: Ty
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PULUMI_SKIP_UPDATE_CHECK: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Prepare Docker context
        run: ./scripts/prepare_docker_context.sh

      - name: Run Ty suite inside Docker
        run: make test-ty
